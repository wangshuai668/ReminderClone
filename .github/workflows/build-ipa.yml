name: Build iOS IPA (Unsigned - sideload with AltStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 安装 XcodeGen 并生成项目
        run: |
          brew install xcodegen
          xcodegen generate
          echo "✅ 项目已生成"

      - name: 🔨 编译 .app（跳过签名）
        run: |
          xcodebuild build \
            -project ReminderClone.xcodeproj \
            -scheme ReminderClone \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath Build/DD \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
          echo "✅ 编译完成 (unsigned)"

      - name: 📦 打包为未签名 IPA
        run: |
          mkdir -p Export/Payload
          APP_PATH=$(find Build/DD -name "*.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          cp -R "$APP_PATH" Export/Payload/
          cd Export
          zip -r ReminderClone.ipa Payload/
          echo "✅ IPA 打包完成"

      - name: 📤 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: ReminderClone-IPA-Unsigned
          path: Export/ReminderClone.ipa
          if-no-files-found: error

      - name: 📋 使用说明
        run: |
          echo "==================== 📱 安装说明 ===================="
          echo "1. 下载上面的 ReminderClone-IPA-Unsigned"
          echo "2. 电脑上打开 AltServer"
          echo "3. iPhone 连接电脑"
          echo "4. AltServer → Install AltStore → 装到 iPhone"
          echo "5. iPhone 上打开 AltStore → My Apps → 右下角 +"
          echo "6. 选择下载的 .ipa → 自动签名安装"
          echo "===================================================="
